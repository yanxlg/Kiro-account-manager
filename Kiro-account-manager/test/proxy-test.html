<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API 反代服务测试</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      padding: 20px;
      color: #e0e0e0;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 {
      text-align: center;
      margin-bottom: 30px;
      color: #f59e0b;
      font-size: 2rem;
    }
    .config-panel {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .config-row {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      align-items: center;
    }
    .config-item { display: flex; flex-direction: column; gap: 5px; }
    .config-item label { font-size: 12px; color: #888; }
    .config-item input {
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(0,0,0,0.3);
      color: #fff;
      font-size: 14px;
    }
    .test-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 20px;
    }
    .test-card {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 20px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .test-card h3 {
      color: #f59e0b;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .test-card h3 .badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 10px;
      background: rgba(245,158,11,0.2);
    }
    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
      color: #fff;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(245,158,11,0.3); }
    .btn-secondary {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.2); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .result-box {
      margin-top: 15px;
      background: rgba(0,0,0,0.3);
      border-radius: 8px;
      padding: 15px;
      font-family: 'Monaco', 'Menlo', monospace;
      font-size: 12px;
      max-height: 300px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .result-box.success { border-left: 3px solid #22c55e; }
    .result-box.error { border-left: 3px solid #ef4444; }
    .result-box.streaming { border-left: 3px solid #3b82f6; }
    .status-indicator {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 8px;
    }
    .status-indicator.online { background: #22c55e; }
    .status-indicator.offline { background: #ef4444; }
    .status-indicator.loading { background: #f59e0b; animation: pulse 1s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .textarea {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(0,0,0,0.3);
      color: #fff;
      font-size: 13px;
      resize: vertical;
      min-height: 80px;
      font-family: inherit;
    }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #aaa; }
    .checkbox-group { display: flex; align-items: center; gap: 8px; }
    .checkbox-group input[type="checkbox"] { width: 16px; height: 16px; }
    select {
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(0,0,0,0.3);
      color: #fff;
      font-size: 14px;
    }
    .quick-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; }
    .stats-row {
      display: flex;
      gap: 20px;
      margin-top: 15px;
      flex-wrap: wrap;
    }
    .stat-item {
      background: rgba(0,0,0,0.2);
      padding: 10px 15px;
      border-radius: 8px;
      text-align: center;
    }
    .stat-item .value { font-size: 24px; font-weight: bold; color: #f59e0b; }
    .stat-item .label { font-size: 12px; color: #888; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔌 API 反代服务测试</h1>

    <!-- 配置面板 -->
    <div class="config-panel">
      <div class="config-row">
        <div class="config-item">
          <label>服务地址</label>
          <input type="text" id="baseUrl" value="http://127.0.0.1:5580" style="width: 200px;">
        </div>
        <div class="config-item">
          <label>API Key (可选)</label>
          <input type="password" id="apiKey" placeholder="留空则不验证" style="width: 200px;">
        </div>
        <div class="config-item" style="align-self: flex-end;">
          <button class="btn btn-secondary" onclick="checkHealth()">
            <span class="status-indicator" id="healthStatus"></span>
            检查服务状态
          </button>
        </div>
      </div>
    </div>

    <div class="test-grid">
      <!-- 健康检查 -->
      <div class="test-card">
        <h3>❤️ 健康检查 <span class="badge">GET /health</span></h3>
        <button class="btn btn-primary" onclick="testHealth()">发送请求</button>
        <div class="result-box" id="healthResult">点击按钮发送请求...</div>
      </div>

      <!-- 模型列表 -->
      <div class="test-card">
        <h3>📋 模型列表 <span class="badge">GET /v1/models</span></h3>
        <button class="btn btn-primary" onclick="testModels()">获取模型列表</button>
        <div class="result-box" id="modelsResult">点击按钮发送请求...</div>
      </div>

      <!-- OpenAI 格式测试 -->
      <div class="test-card">
        <h3>🤖 OpenAI 格式 <span class="badge">POST /v1/chat/completions</span></h3>
        <div class="form-group">
          <label>提示词</label>
          <textarea class="textarea" id="openaiPrompt">你好，请用一句话介绍自己。</textarea>
        </div>
        <div class="form-group">
          <label>模型</label>
          <select id="openaiModel">
            <option value="deepseek-3.2">deepseek-3.2</option>
            <option value="minimax-m2.5">minimax-m2.5</option>
            <option value="minimax-m2.1">minimax-m2.1</option>
            <option value="glm-5">glm-5</option>
            <option value="qwen3-coder-next">qwen3-coder-next</option>
            <option value="gpt-4">gpt-4 (映射)</option>
          </select>
        </div>
        <div class="checkbox-group">
          <input type="checkbox" id="openaiStream" checked>
          <label for="openaiStream">流式输出 (stream)</label>
        </div>
        <div style="margin-top: 15px;">
          <button class="btn btn-primary" onclick="testOpenAI()" id="openaiBtn">发送请求</button>
        </div>
        <div class="result-box" id="openaiResult">点击按钮发送请求...</div>
      </div>

      <!-- Claude 格式测试 -->
      <div class="test-card">
        <h3>🎭 Claude 格式 <span class="badge">POST /v1/messages</span></h3>
        <div class="form-group">
          <label>提示词</label>
          <textarea class="textarea" id="claudePrompt">请写一首关于编程的短诗。</textarea>
        </div>
        <div class="form-group">
          <label>模型</label>
          <select id="claudeModel">
            <option value="deepseek-3.2">deepseek-3.2</option>
            <option value="minimax-m2.5">minimax-m2.5</option>
            <option value="minimax-m2.1">minimax-m2.1</option>
            <option value="glm-5">glm-5</option>
            <option value="qwen3-coder-next">qwen3-coder-next</option>
          </select>
        </div>
        <div class="checkbox-group">
          <input type="checkbox" id="claudeStream" checked>
          <label for="claudeStream">流式输出 (stream)</label>
        </div>
        <div style="margin-top: 15px;">
          <button class="btn btn-primary" onclick="testClaude()" id="claudeBtn">发送请求</button>
        </div>
        <div class="result-box" id="claudeResult">点击按钮发送请求...</div>
      </div>

      <!-- Agentic 模式测试 -->
      <div class="test-card">
        <h3>🤖 Agentic 模式 <span class="badge">带工具调用</span></h3>
        <div class="form-group">
          <label>提示词</label>
          <textarea class="textarea" id="agenticPrompt">今天北京的天气怎么样？</textarea>
        </div>
        <div style="margin-top: 15px;">
          <button class="btn btn-primary" onclick="testAgentic()" id="agenticBtn">发送请求</button>
        </div>
        <div class="result-box" id="agenticResult">点击按钮发送请求...</div>
      </div>

      <!-- 管理 API -->
      <div class="test-card">
        <h3>⚙️ 管理 API <span class="badge">需要 API Key</span></h3>
        <div class="quick-actions">
          <button class="btn btn-secondary" onclick="testAdminStats()">详细统计</button>
          <button class="btn btn-secondary" onclick="testAdminAccounts()">账号列表</button>
          <button class="btn btn-secondary" onclick="testAdminLogs()">请求日志</button>
        </div>
        <div class="result-box" id="adminResult">点击按钮发送请求...</div>
      </div>
    </div>
  </div>

  <script>
    function getBaseUrl() {
      return document.getElementById('baseUrl').value.replace(/\/$/, '');
    }

    function getHeaders() {
      const apiKey = document.getElementById('apiKey').value;
      const headers = { 'Content-Type': 'application/json' };
      if (apiKey) {
        headers['Authorization'] = `Bearer ${apiKey}`;
      }
      return headers;
    }

    function formatResult(data, isError = false) {
      if (typeof data === 'object') {
        return JSON.stringify(data, null, 2);
      }
      return data;
    }

    function setResult(id, content, type = 'success') {
      const box = document.getElementById(id);
      box.textContent = content;
      box.className = `result-box ${type}`;
    }

    function populateModelSelect(selectId, models) {
      const select = document.getElementById(selectId);
      const selected = select.value;
      const validModels = models.filter(model => model && typeof model.id === 'string' && model.id !== 'auto');
      if (validModels.length === 0) return;
      select.innerHTML = '';
      for (const model of validModels) {
        const option = document.createElement('option');
        option.value = model.id;
        option.textContent = model.name && model.name !== model.id ? `${model.id} (${model.name})` : model.id;
        select.appendChild(option);
      }
      if (validModels.some(model => model.id === selected)) {
        select.value = selected;
      }
    }

    async function loadModelSelects() {
      try {
        const res = await fetch(`${getBaseUrl()}/v1/models`, { headers: getHeaders() });
        if (!res.ok) return;
        const data = await res.json();
        if (!Array.isArray(data.data)) return;
        populateModelSelect('openaiModel', data.data);
        populateModelSelect('claudeModel', data.data);
      } catch (e) {}
    }

    async function checkHealth() {
      const indicator = document.getElementById('healthStatus');
      indicator.className = 'status-indicator loading';
      try {
        const res = await fetch(`${getBaseUrl()}/health`);
        indicator.className = res.ok ? 'status-indicator online' : 'status-indicator offline';
      } catch (e) {
        indicator.className = 'status-indicator offline';
      }
    }

    async function testHealth() {
      try {
        const res = await fetch(`${getBaseUrl()}/health`);
        const data = await res.json();
        setResult('healthResult', formatResult(data), res.ok ? 'success' : 'error');
      } catch (e) {
        setResult('healthResult', `错误: ${e.message}`, 'error');
      }
    }

    async function testModels() {
      try {
        const res = await fetch(`${getBaseUrl()}/v1/models`, { headers: getHeaders() });
        const data = await res.json();
        if (Array.isArray(data.data)) {
          populateModelSelect('openaiModel', data.data);
          populateModelSelect('claudeModel', data.data);
        }
        setResult('modelsResult', formatResult(data), res.ok ? 'success' : 'error');
      } catch (e) {
        setResult('modelsResult', `错误: ${e.message}`, 'error');
      }
    }

    async function testOpenAI() {
      const btn = document.getElementById('openaiBtn');
      btn.disabled = true;
      const resultBox = document.getElementById('openaiResult');
      resultBox.textContent = '';
      resultBox.className = 'result-box streaming';

      const prompt = document.getElementById('openaiPrompt').value;
      const model = document.getElementById('openaiModel').value;
      const stream = document.getElementById('openaiStream').checked;

      try {
        const res = await fetch(`${getBaseUrl()}/v1/chat/completions`, {
          method: 'POST',
          headers: getHeaders(),
          body: JSON.stringify({
            model,
            messages: [{ role: 'user', content: prompt }],
            stream,
            max_tokens: 1024
          })
        });

        if (!res.ok) {
          const error = await res.text();
          setResult('openaiResult', `HTTP ${res.status}: ${error}`, 'error');
          return;
        }

        if (stream) {
          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let content = '';

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            const chunk = decoder.decode(value);
            const lines = chunk.split('\n').filter(l => l.startsWith('data: '));

            for (const line of lines) {
              const data = line.slice(6);
              if (data === '[DONE]') continue;
              try {
                const json = JSON.parse(data);
                if (json.error?.message) {
                  content += `\n错误: ${json.error.message}`;
                  resultBox.className = 'result-box error';
                  continue;
                }
                const delta = json.choices?.[0]?.delta?.content || '';
                content += delta;
                resultBox.textContent = content;
              } catch (e) {}
            }
          }
          resultBox.className = 'result-box success';
        } else {
          const data = await res.json();
          const content = data.choices?.[0]?.message?.content || JSON.stringify(data, null, 2);
          setResult('openaiResult', content, 'success');
        }
      } catch (e) {
        setResult('openaiResult', `错误: ${e.message}`, 'error');
      } finally {
        btn.disabled = false;
      }
    }

    async function testClaude() {
      const btn = document.getElementById('claudeBtn');
      btn.disabled = true;
      const resultBox = document.getElementById('claudeResult');
      resultBox.textContent = '';
      resultBox.className = 'result-box streaming';

      const prompt = document.getElementById('claudePrompt').value;
      const model = document.getElementById('claudeModel').value;
      const stream = document.getElementById('claudeStream').checked;

      try {
        const res = await fetch(`${getBaseUrl()}/v1/messages`, {
          method: 'POST',
          headers: {
            ...getHeaders(),
            'anthropic-version': '2023-06-01'
          },
          body: JSON.stringify({
            model,
            messages: [{ role: 'user', content: prompt }],
            stream,
            max_tokens: 1024
          })
        });

        if (!res.ok) {
          const error = await res.text();
          setResult('claudeResult', `HTTP ${res.status}: ${error}`, 'error');
          return;
        }

        if (stream) {
          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let content = '';

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            const chunk = decoder.decode(value);
            const lines = chunk.split('\n').filter(l => l.startsWith('data: '));

            for (const line of lines) {
              const data = line.slice(6);
              try {
                const json = JSON.parse(data);
                if (json.type === 'content_block_delta') {
                  content += json.delta?.text || '';
                  resultBox.textContent = content;
                }
              } catch (e) {}
            }
          }
          resultBox.className = 'result-box success';
        } else {
          const data = await res.json();
          const content = data.content?.[0]?.text || JSON.stringify(data, null, 2);
          setResult('claudeResult', content, 'success');
        }
      } catch (e) {
        setResult('claudeResult', `错误: ${e.message}`, 'error');
      } finally {
        btn.disabled = false;
      }
    }

    async function testAgentic() {
      const btn = document.getElementById('agenticBtn');
      btn.disabled = true;
      const resultBox = document.getElementById('agenticResult');
      resultBox.textContent = '发送带工具的请求...';
      resultBox.className = 'result-box streaming';

      const prompt = document.getElementById('agenticPrompt').value;

      try {
        const res = await fetch(`${getBaseUrl()}/v1/chat/completions`, {
          method: 'POST',
          headers: getHeaders(),
          body: JSON.stringify({
            model: 'deepseek-3.2',
            messages: [{ role: 'user', content: prompt }],
            tools: [{
              type: 'function',
              function: {
                name: 'get_weather',
                description: '获取指定城市的天气信息',
                parameters: {
                  type: 'object',
                  properties: {
                    city: { type: 'string', description: '城市名称' }
                  },
                  required: ['city']
                }
              }
            }],
            stream: false,
            max_tokens: 1024
          })
        });

        if (!res.ok) {
          const error = await res.text();
          setResult('agenticResult', `HTTP ${res.status}: ${error}`, 'error');
          return;
        }

        const data = await res.json();
        setResult('agenticResult', formatResult(data), 'success');
      } catch (e) {
        setResult('agenticResult', `错误: ${e.message}`, 'error');
      } finally {
        btn.disabled = false;
      }
    }

    async function testAdminStats() {
      try {
        const res = await fetch(`${getBaseUrl()}/admin/stats`, { headers: getHeaders() });
        const data = await res.json();
        setResult('adminResult', formatResult(data), res.ok ? 'success' : 'error');
      } catch (e) {
        setResult('adminResult', `错误: ${e.message}`, 'error');
      }
    }

    async function testAdminAccounts() {
      try {
        const res = await fetch(`${getBaseUrl()}/admin/accounts`, { headers: getHeaders() });
        const data = await res.json();
        setResult('adminResult', formatResult(data), res.ok ? 'success' : 'error');
      } catch (e) {
        setResult('adminResult', `错误: ${e.message}`, 'error');
      }
    }

    async function testAdminLogs() {
      try {
        const res = await fetch(`${getBaseUrl()}/admin/logs`, { headers: getHeaders() });
        const data = await res.json();
        setResult('adminResult', formatResult(data), res.ok ? 'success' : 'error');
      } catch (e) {
        setResult('adminResult', `错误: ${e.message}`, 'error');
      }
    }

    // 页面加载时检查健康状态
    loadModelSelects();
    checkHealth();
  </script>
</body>
</html>
